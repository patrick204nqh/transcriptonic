<!-- popup.html -->
<!DOCTYPE html>
<html>

<head>
  <title>Meet Transcripts</title>
  <style>
    :root {
      --brand:         #38bdf8;
      --brand-dim:     rgba(56, 189, 248, 0.12);
      --brand-border:  rgba(56, 189, 248, 0.3);
      --text:          #f1f5f9;
      --text-2:        #94a3b8;
      --text-3:        #475569;
      --glass:         rgba(255, 255, 255, 0.05);
      --glass-hover:   rgba(255, 255, 255, 0.09);
      --glass-border:  rgba(255, 255, 255, 0.12);
      --border:        rgba(255, 255, 255, 0.08);
      --r-sm:          8px;
      --r:             14px;
    }

    * { box-sizing: border-box; }

    body {
      width: 400px;
      padding: 1.25rem;
      background: linear-gradient(145deg, #071e34 0%, #0c2d4d 50%, #081f38 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.875rem;
      line-height: 1.5;
      margin: 0;
      accent-color: var(--brand);
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #bae6fd 0%, #38bdf8 55%, #0284c7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p { margin: 0; }

    a {
      color: var(--brand);
      font-weight: 600;
      text-underline-offset: 3px;
      text-decoration-color: var(--brand-border);
      transition: text-decoration-color 0.15s;
    }

    a:hover { text-decoration-color: var(--brand); }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }

    .header-desc {
      font-size: 0.75rem;
      color: var(--text-2);
      margin-top: 0.2rem;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: var(--r-sm);
      border: 1px solid var(--brand-border);
      background: rgba(56, 189, 248, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
      padding: 3px;
    }

    /* ── Cards ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 1rem;
      margin-bottom: 0.625rem;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* ── Status dot ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--brand);
      margin-bottom: 0.875rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--brand);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--brand), 0 0 16px rgba(56, 189, 248, 0.4);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--brand), 0 0 16px rgba(167, 139, 250, 0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 4px var(--brand), 0 0 8px rgba(56, 189, 248, 0.2); }
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.875rem 0;
    }

    /* ── Radio items ── */
    .radio-item {
      display: flex;
      gap: 0.625rem;
      align-items: flex-start;
      padding: 0.5rem 0.5rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 0.25rem;
    }

    .radio-item:last-of-type { margin-bottom: 0; }

    .radio-item:hover { background: var(--glass-hover); }

    input[type="radio"] {
      margin-top: 0.2rem;
      width: 15px;
      height: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }

    label {
      cursor: pointer;
      line-height: 1.4;
    }

    label b { color: var(--text); }

    .sub-text {
      font-size: 0.75rem;
      color: var(--text-2);
    }

    .footnote {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    /* ── Webhook card ── */
    .webhook-card {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .tool-logos {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      flex-shrink: 0;
    }

    .tool-logo {
      height: 22px;
      width: auto;
      opacity: 0.75;
      filter: brightness(1.1);
    }

    .webhook-card p {
      font-size: 0.8125rem;
      color: var(--text-2);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.875rem;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .footer a, .footer-version {
      font-size: 0.75rem;
      font-weight: 500;
    }

    .footer-sep {
      color: var(--text-3);
      font-size: 0.5rem;
      margin: 0 0.2rem;
    }

    .footer-version { color: var(--text-3); }
  </style>
</head>

<body>
  <div class="header">
    <div>
      <h1>Meet Transcripts</h1>
      <p class="header-desc">Google Meet transcript capture. Private, local, no telemetry.</p>
    </div>
    <img class="logo" src="./icons/logo.svg" alt="Meet Transcripts logo" />
  </div>

  <div class="card">
    <div class="status-bar">
      <span class="status-dot"></span>Active on Google Meet
    </div>
    <div class="radio-item">
      <input type="radio" name="mode" id="auto-mode" />
      <label for="auto-mode">
        <b>Auto mode</b><br />
        <span class="sub-text">Capture transcripts for every meeting automatically</span>
      </label>
    </div>
    <div class="radio-item">
      <input type="radio" name="mode" id="manual-mode" />
      <label for="manual-mode">
        <b>Manual mode</b><br />
        <span class="sub-text">Toggle capture on and off during each meeting</span>
      </label>
    </div>
    <p class="footnote">Transcripts are saved locally and downloaded as a text file after each meeting.</p>
  </div>

  <div class="card webhook-card">
    <div class="tool-logos">
      <img class="tool-logo" src="./icons/google-docs.svg" alt="Google Docs logo">
      <img class="tool-logo" src="./icons/notion.svg" alt="Notion logo">
    </div>
    <p>Send transcripts to any tool via <a href="meetings.html#webhooks" target="_blank">webhooks &rarr;</a></p>
  </div>

  <div class="footer">
    <a href="./meetings.html" target="_blank">Last 10 meetings &rarr;</a>
    <div class="footer-links">
      <a href="https://github.com/patrick204nqh/meet-transcripts#readme" target="_blank">Help</a>
      <span class="footer-sep">&#9679;</span>
      <a href="https://github.com/patrick204nqh/meet-transcripts/issues" target="_blank">Report a bug</a>
      <span class="footer-sep">&#9679;</span>
      <span class="footer-version" id="version"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
