<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="url(#bgGrad)"/>

  <!-- Speech bubble body -->
  <rect x="4" y="3" width="30" height="25" rx="5" fill="#1e3a8a"/>
  <rect x="4" y="3" width="30" height="25" rx="5" fill="none" stroke="#38bdf8" stroke-width="1.2"/>

  <!-- Bubble tail -->
  <polygon points="8,28 14,28 10,34" fill="#1e3a8a"/>
  <line x1="8" y1="28" x2="10" y2="34" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="10" y2="34" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Seal the tail base into the bubble -->
  <line x1="8" y1="28" x2="14" y2="28" stroke="#1e3a8a" stroke-width="1.5"/>

  <!-- Transcript lines -->
  <rect x="8" y="9"  width="21" height="2" rx="1" fill="#bae6fd" opacity="0.85"/>
  <rect x="8" y="13" width="16" height="2" rx="1" fill="#bae6fd" opacity="0.85"/>
  <rect x="8" y="17" width="11" height="2" rx="1" fill="#bae6fd" opacity="0.85"/>

  <!-- Audio waveform bars -->
  <rect x="10" y="23" width="2" height="3" rx="1" fill="#38bdf8"/>
  <rect x="13" y="21" width="2" height="5" rx="1" fill="#38bdf8"/>
  <rect x="16" y="19" width="2" height="7" rx="1" fill="#38bdf8"/>
  <rect x="19" y="22" width="2" height="4" rx="1" fill="#38bdf8"/>
  <rect x="22" y="23" width="2" height="3" rx="1" fill="#38bdf8"/>
</svg>
